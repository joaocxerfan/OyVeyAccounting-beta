{% extends "base.html" %}
{% block title %}{% if account %}Edit Account{% else %}New Account{% endif %} — OyVey Accounting{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if account %}Edit Account{% else %}New Account{% endif %}</h1>
    <a href="{{ url_for('accounts') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="form-container">
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Account Name</label>
            <input type="text" id="name" name="name" class="form-control"
                   value="{{ account.name if account else '' }}"
                   placeholder="e.g. Main Checking" required>
        </div>

        <div class="form-group">
            <label for="type">Account Type</label>
            <select id="type" name="type" class="form-control" required>
                <option value="checking" {% if account and account.type == 'checking' %}selected{% endif %}>Checking</option>
                <option value="savings" {% if account and account.type == 'savings' %}selected{% endif %}>Savings</option>
                <option value="credit" {% if account and account.type == 'credit' %}selected{% endif %}>Credit Card</option>
                <option value="cash" {% if account and account.type == 'cash' %}selected{% endif %}>Cash</option>
                <option value="investment" {% if account and account.type == 'investment' %}selected{% endif %}>Investment</option>
                <option value="other" {% if account and account.type == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea id="description" name="description" class="form-control" rows="3"
                      placeholder="Brief description of this account">{{ account.description if account else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {% if account %}Save Changes{% else %}Create Account{% endif %}
            </button>
            <a href="{{ url_for('accounts') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
