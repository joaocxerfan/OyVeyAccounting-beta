name: CI — Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v || echo "No tests found — skipping."

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t oyveyaccounting:test .

      - name: Smoke test — health endpoint
        run: |
          docker run -d -p 8080:8080 --name test-container oyveyaccounting:test
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://localhost:8080/health
          docker stop test-container
